<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shared Todos — Web Terminal</title>
  <link rel="stylesheet" href="/css/terminal.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    #terminal { width: 800px; max-width: 100%; }
    #terminal #output { min-height: 200px; }
    .password-form { display: flex; gap: 10px; margin-top: 12px; }
    .password-form input {
      flex: 1;
      background: transparent;
      border: 1px solid #444;
      color: #f0f0f0;
      font-family: inherit;
      font-size: 14px;
      padding: 6px 10px;
      outline: none;
      border-radius: 4px;
    }
    .password-form input:focus { border-color: #00ff41; }
    .password-form button {
      background: transparent;
      border: 1px solid #00ff41;
      color: #00ff41;
      font-family: inherit;
      font-size: 13px;
      padding: 6px 16px;
      cursor: pointer;
      border-radius: 4px;
    }
    .password-form button:hover { background: rgba(0,255,65,0.1); }
    .loading { color: #888; }
    .error { color: #ff5555; }
  </style>
</head>
<body>
  <div id="terminal">
    <div id="titlebar">
      <div class="traffic-lights">
        <span class="dot close"></span>
        <span class="dot minimize"></span>
        <span class="dot maximize"></span>
      </div>
      <span class="title-text">Web Terminal — shared todos</span>
      <span class="title-spacer"></span>
    </div>
    <div id="output">
      <div class="line loading">Loading shared todos...</div>
    </div>
    <div id="input-line" class="hidden">
      <span class="prompt">password:</span>
      <input type="password" id="password-input" spellcheck="false">
      <button id="unlock-btn" style="background:transparent;border:1px solid #00ff41;color:#00ff41;font-family:inherit;font-size:13px;padding:6px 12px;cursor:pointer;border-radius:4px;margin-left:8px;">Unlock</button>
    </div>
  </div>

  <script>
    const token = window.location.pathname.split('/').pop();
    const output = document.getElementById('output');
    const passwordLine = document.getElementById('input-line');
    const passwordInput = document.getElementById('password-input');
    const unlockBtn = document.getElementById('unlock-btn');

    function escapeHtml(str) {
      const el = document.createElement('span');
      el.textContent = str;
      return el.innerHTML;
    }

    function addLine(html, cls = '') {
      const div = document.createElement('div');
      div.className = 'line ' + cls;
      div.innerHTML = html;
      output.appendChild(div);
    }

    function renderTodos(todos) {
      const header = document.createElement('div');
      header.className = 'todo-row header';
      header.innerHTML = `
        <div class="todo-cell id">#</div>
        <div class="todo-cell check"></div>
        <div class="todo-cell title">Title</div>
        <div class="todo-cell priority">Pri</div>
        <div class="todo-cell due">Due</div>
        <div class="todo-cell category">Cat</div>
      `;
      output.appendChild(header);

      todos.forEach(t => {
        const row = document.createElement('div');
        row.className = 'todo-row';
        if (t.completed) row.classList.add('done');
        const priClass = t.priority === 'high' ? 'priority-high' : t.priority === 'low' ? 'priority-low' : 'priority-medium';
        row.innerHTML = `
          <div class="todo-cell id">${t.id}</div>
          <div class="todo-cell check ${t.completed ? 'checkbox-done' : 'checkbox-pending'}">${t.completed ? '☑' : '☐'}</div>
          <div class="todo-cell title${t.completed ? ' done' : ''}"><span class="title-text">${escapeHtml(t.title)}</span></div>
          <div class="todo-cell priority ${priClass}">${t.priority.toUpperCase().substring(0, 4)}</div>
          <div class="todo-cell due">${t.due_date || ''}</div>
          <div class="todo-cell category">${escapeHtml(t.category || '')}</div>
        `;
        output.appendChild(row);
      });
    }

    async function loadShared() {
      try {
        const res = await fetch(`/api/share/${token}`);
        const data = await res.json();
        output.innerHTML = '';

        if (!res.ok) {
          addLine(`<span class="red">Error:</span> ${escapeHtml(data.error)}`, 'error');
          return;
        }

        if (data.protected) {
          addLine('<span class="yellow">This list is password protected.</span>');
          passwordLine.classList.remove('hidden');
          passwordInput.focus();
        } else {
          addLine(`<span class="green">Shared Todos (${data.todos.length} items)</span>`);
          renderTodos(data.todos);
        }
      } catch (err) {
        output.innerHTML = '';
        addLine(`<span class="red">Error:</span> Failed to load shared todos.`, 'error');
      }
    }

    async function unlock() {
      const password = passwordInput.value;
      if (!password) return;

      try {
        const res = await fetch(`/api/share/${token}/verify`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password }),
        });
        const data = await res.json();
        output.innerHTML = '';

        if (!res.ok) {
          addLine(`<span class="red">Error:</span> ${escapeHtml(data.error)}`, 'error');
          passwordInput.value = '';
          passwordInput.focus();
          return;
        }

        passwordLine.classList.add('hidden');
        addLine(`<span class="green">Shared Todos (${data.todos.length} items)</span>`);
        renderTodos(data.todos);
      } catch (err) {
        addLine(`<span class="red">Error:</span> Failed to verify password.`, 'error');
      }
    }

    unlockBtn.addEventListener('click', unlock);
    passwordInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') unlock();
    });

    loadShared();
  </script>
</body>
</html>
