<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Terminal — todo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/terminal.css">
</head>
<body>
  <div id="terminal">
    <div id="titlebar">
      <div class="traffic-lights">
        <span class="dot close"></span>
        <span class="dot minimize"></span>
        <span class="dot maximize"></span>
      </div>
      <span class="title-text">Web Terminal — todo</span>
      <span class="title-spacer"></span>
    </div>
    <div id="output">
      <div class="line welcome">
        <span class="green">Web Terminal v1.0</span><br>
        Type <span class="yellow">help</span> to see available commands.<br>
        Use <span class="cyan">↑</span> <span class="cyan">↓</span> for history, <span class="cyan">Tab</span> for autocomplete.
      </div>
    </div>
    <div id="input-line">
      <span class="prompt">$</span>
      <input type="text" id="command-input" autofocus spellcheck="false" autocomplete="off">
    </div>
  </div>

  <div id="overlay" class="hidden" onclick="closeOverlay()">
    <div id="overlay-content" onclick="event.stopPropagation()">
      <pre id="overlay-text"></pre>
      <button onclick="closeOverlay()">[ Close ]</button>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/commands.js"></script>
  <script src="/js/terminal.js"></script>
</body>
</html>
